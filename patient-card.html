<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Clinic Queue" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<title>Patient Card</title>
<link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
<link rel="stylesheet" href="css/styles.css" />
<style>
  body { background: #e8e8e8; }
  .print-page { display: flex; justify-content: center; padding: 2rem 1rem; }
  .card-sheet {
    background: white; width: 340px; padding: 1.25rem;
    border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    font-family: var(--sans);
  }
  .card-clinic-name { font-size: 0.78rem; font-weight: 700; color: var(--teal-900); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
  .card-patient-name { font-size: 1.3rem; font-weight: 800; margin: 0 0 0.15rem; }
  .card-meta { font-size: 0.85rem; color: var(--ink-soft); margin: 0 0 1rem; }
  .card-qr-row { display: flex; align-items: center; gap: 1rem; }
  .card-qr-row svg { width: 120px; height: 120px; flex-shrink: 0; }
  .card-id-block { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--teal-900); }
  .card-id-label { font-size: 0.7rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.2rem; }
  .no-print { margin-top: 1.5rem; display: flex; gap: 0.75rem; justify-content: center; }
  @media print {
    body { background: white; }
    .no-print { display: none; }
    .print-page { padding: 0; }
    .card-sheet { box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="print-page">
    <div>
      <div class="card-sheet" id="card-sheet">
        <div class="card-clinic-name" data-clinic-name>Clinic Queue</div>
        <p class="card-patient-name" id="card-name">Loading…</p>
        <p class="card-meta" id="card-meta"></p>
        <div class="card-qr-row">
          <div id="qr-container"></div>
          <div>
            <div class="card-id-label">Patient ID</div>
            <div class="card-id-block" id="card-id">—</div>
          </div>
        </div>
      </div>
      <div class="no-print">
        <button class="btn btn-outline" onclick="window.close()">Close</button>
        <button class="btn btn-primary" onclick="window.print()">Print</button>
      </div>
    </div>
  </div>

<script type="module">
import { db, getDoc, doc } from "./js/firebase-config.js";
import { applyClinicBranding } from "./js/queue-logic.js";
import { generateQR } from "./js/qrcode-lib.js";

applyClinicBranding();

const params = new URLSearchParams(window.location.search);
const patientId = params.get("id");

if (!patientId) {
  document.getElementById("card-name").textContent = "No patient specified.";
} else {
  const snap = await getDoc(doc(db, "patients", patientId));
  if (!snap.exists()) {
    document.getElementById("card-name").textContent = "Patient not found.";
  } else {
    const p = snap.data();
    document.getElementById("card-name").textContent = p.name || "—";
    document.getElementById("card-meta").textContent = `${p.age || "—"} yrs · ${p.gender || "—"} · ${p.mobile || "—"}`;
    document.getElementById("card-id").textContent = p.patientCode || "No ID on record";

    if (p.patientCode) {
      renderQrSvg(p.patientCode, document.getElementById("qr-container"));
    } else {
      document.getElementById("qr-container").innerHTML = '<p class="small muted" style="width:120px;">No Patient ID to encode — this looks like a record created before the ID system was added.</p>';
    }
  }
}

function renderQrSvg(text, container) {
  const { matrix, size } = generateQR(text, { errorCorrectionLevel: "M" });
  const quietZone = 2; // modules of white border inside the SVG, beyond the matrix itself
  const total = size + quietZone * 2;
  let path = "";
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (matrix[r][c] === 1) {
        path += `M${c + quietZone},${r + quietZone}h1v1h-1z `;
      }
    }
  }
  const svg = `<svg viewBox="0 0 ${total} ${total}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect width="${total}" height="${total}" fill="#ffffff"/>
    <path d="${path}" fill="#0F4C4F"/>
  </svg>`;
  container.innerHTML = svg;
}
</script>
</body>
</html>
